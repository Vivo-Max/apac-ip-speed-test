name: IP Filter and Speed Test

on:
  schedule:
    - cron: '0 0 * * 1'  # 每天 UTC 00:00 运行
  workflow_dispatch:  # 支持手动触发

jobs:
  filter-and-speed-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 整个工作流最大运行时间 60 分钟

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史以支持 Git 操作

      # 2. 设置 Python 环境
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'  # 缓存 pip 依赖以加速安装

      # 3. 缓存 pip 依赖（进一步优化）
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --verbose  # 使用 --verbose 强制刷新 pip 输出
        env:
          PIP_LOG: pip.log  # 可选：将 pip 日志输出到文件，便于调试

      # 5. 下载测速脚本
      - name: Download iptest script
        run: |
          wget https://github.com/sjlleo/iptest/raw/main/iptest -O iptest
          chmod +x iptest
        shell: bash

      # 6. 运行脚本（第一阶段：生成 ip.txt）
      - name: Run script to generate ip.txt
        run: |
          python ip-filter-speedtest-api.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        timeout-minutes: 15  # 单个步骤最大运行时间 15 分钟

      # 7. 运行脚本（第二阶段：测速并生成 ip.csv 和 ips.txt）
      - name: Run script to perform speed test and generate ip.csv, ips.txt
        run: |
          python ip-filter-speedtest-api.py --generate-ips
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        timeout-minutes: 30  # 测速步骤可能较长，设置 30 分钟

      # 8. 上传生成的工件（便于调试）
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ip-files
          path: |
            ip.txt
            ip.csv
            ips.txt
            speedtest.log
        if: always()  # 即使工作流失败也上传工件

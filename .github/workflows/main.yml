name: IP Speed Test

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1"

jobs:
  speedtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install requests charset-normalizer geoip2

      - name: Set execute permissions
        run: chmod +x iptest.sh iptest
        continue-on-error: true

      - name: Run script
        run: python ip-filter-speedtest-api.py --url=$INPUT_URL --generate-ips
        env:
          INPUT_URL: https://raw.githubusercontent.com/gxiaobai2024/api/refs/heads/main/proxyip%20.csv
        timeout-minutes: 20
        continue-on-error: true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: speedtest-results
          path: |
            ip.txt
            ip.csv
            ips.txt
            speedtest.log
          if-no-files-found: warn

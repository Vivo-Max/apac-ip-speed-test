name: APAC IP Speed Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  speed-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run speed test script
      run: python ip-filter-speedtest-api.py

    - name: Print working directory and list files
      run: |
        echo "当前工作目录："
        pwd
        echo "列出文件："
        ls -lh
        echo "检查 ip.txt, ip.csv, ips.txt 是否存在："
        ls -lh ip.txt ip.csv ips.txt || echo "某些文件不存在"
        echo "显示 ips.txt 内容："
        cat ips.txt || echo "ips.txt 不存在"

    - name: Upload speed test results
      uses: actions/upload-artifact@v4
      with:
        name: speed-test-results
        path: |
          ip.txt
          ip.csv
          ips.txt
        if-no-files-found: warn

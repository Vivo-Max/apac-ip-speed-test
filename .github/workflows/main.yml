name: Speed Test

on: [push, workflow_dispatch]
jobs:
  speed-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install requests charset-normalizer geoip2
      - run: python ip-filter-speedtest-api.py
      - run: python ip-filter-speedtest-api.py --generate-ips
      - run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          files=""
          for file in ip.txt ip.csv ips.txt; do
            if [ -f "$file" ] && [ -s "$file" ]; then
              files="$files $file"
            fi
          done
          if [ -n "$files" ]; then
            git add $files
            git commit -m "Final sync of ip.txt, ip.csv, ips.txt [skip ci]" || echo "无变化需要提交"
            git push
            echo "已提交和推送文件：$files"
          else
            echo "无有效文件需要提交"
            exit 1
          fi

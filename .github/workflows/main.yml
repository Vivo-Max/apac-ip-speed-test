name: IP Speed Test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  speedtest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache GeoIP database
        uses: actions/cache@v4
        with:
          path: GeoLite2-Country.mmdb
          key: geoip-2025.04.10
          restore-keys: |
            geoip-

      - name: Install dependencies
        run: pip install geoip2 requests charset-normalizer

      - name: Set execute permissions
        run: chmod +x iptest.sh iptest
        continue-on-error: true

      - name: Validate input data
        run: |
          echo "Downloading and validating input CSV..."
          curl -s -o input.csv $INPUT_URL
          lines=$(wc -l < input.csv)
          echo "Input CSV lines: $lines" > input_size.txt
          head -n 5 input.csv > input_sample.txt
          echo "Input sample (first 5 lines):" >> input_size.txt
          cat input_sample.txt >> input_size.txt
          if [ "$lines" -lt 100 ]; then
            echo "Warning: Input contains fewer than 100 lines, may be insufficient" >> input_size.txt
          fi
        env:
          INPUT_URL: https://raw.githubusercontent.com/gxiaobai2024/api/refs/heads/main/proxyip%20.csv

      - name: Test network environment
        run: |
          echo "Testing network environment..." > network_test.txt
          echo "Ping test to 8.8.8.8:" >> network_test.txt
          ping -c 3 -W 1 8.8.8.8 >> network_test.txt 2>&1 || echo "Ping failed, falling back to HTTP" >> network_test.txt
          echo "HTTP latency to speed.cloudflare.com:" >> network_test.txt
          curl -o /dev/null -s -w "HTTP latency: %{time_total}s\n" speed.cloudflare.com/__down?bytes=1000000 >> network_test.txt
          cat network_test.txt

      - name: Run IP filter and speed test
        run: python ip-filter-speedtest-api.py --url=$INPUT_URL --target-nodes=500 --latency-threshold=500
        env:
          INPUT_URL: https://raw.githubusercontent.com/gxiaobai2024/api/refs/heads/main/proxyip%20.csv
        timeout-minutes: 9

      - name: Summarize results
        run: |
          echo "ip.txt nodes: $(wc -l < ip.txt 2>/dev/null || echo 0)"
          echo "ip.csv nodes: $(tail -n +2 ip.csv | wc -l 2>/dev/null || echo 0)"
          echo "ips.txt nodes: $(wc -l < ips.txt 2>/dev/null || echo 0)"
          echo "Log summary:"
          grep -E "解析到|采样后|延迟测试完成|保留国家|过滤国家|ip.txt 国家分布|测速完成|错误|警告" speedtest.log || echo "No relevant log entries"
        continue-on-error: true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: speedtest-results
          path: |
            ip.txt
            ip.csv
            ips.txt
            speedtest.log
            input_size.txt
            input_sample.txt
            network_test.txt
          if-no-files-found: warn

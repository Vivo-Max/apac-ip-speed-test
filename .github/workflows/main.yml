name: Proxy IP Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 00:00 运行
  workflow_dispatch:  # 支持手动触发

jobs:
  check-proxy-ip:
    runs-on: ubuntu-latest

    steps:
      # 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 检查工作目录
      - name: Check working directory
        run: |
          pwd
          ls -l
          touch test.txt && echo "Test" > test.txt && cat test.txt || echo "Failed to write to directory"

      # 检查 input.csv
      - name: Check for input.csv
        run: |
          if [ ! -f "input.csv" ]; then
            echo "Warning: input.csv not found, will try URL"
          else
            echo "input.csv found, encoding:"
            file input.csv
            echo "First 5 lines:"
            head -n 5 input.csv || echo "Failed to read input.csv"
          fi

      # 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests charset-normalizer

      # 安装系统依赖
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl wget

      # 检查 iptest 二进制文件
      - name: Check iptest binary
        run: |
          if [ -f "iptest" ]; then
            chmod +x iptest
            ls -l iptest
            ldd iptest || echo "Failed to check iptest dependencies"
          else
            echo "iptest binary not found, assuming iptest.sh handles testing"
          fi

      # 确保测速脚本存在并可执行
      - name: Prepare speedtest script
        run: |
          if [ -f "iptest.sh" ]; then
            chmod +x iptest.sh
            ls -l iptest.sh
            ./iptest.sh --version || echo "iptest.sh failed to run, will attempt in main script"
          else
            echo "iptest.sh not found!"
            exit 1
          fi

      # 运行脚本，带重试机制
      - name: Run proxy IP check
        env:
          PYTHONUNBUFFERED: 1  # 实时输出日志
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 60
          max_attempts: 3
          command: python -u ip-filter-speedtest-api.py

      # 调试 ip.txt
      - name: Debug ip.txt
        if: always()
        run: |
          if [ -f "ip.txt" ]; then
            echo "ip.txt exists, content:"
            cat ip.txt
          else
            echo "ip.txt not found!"
          fi

      # 上传结果文件
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proxy-ip-results
          path: |
            ip.txt
            ip.csv
            ips.txt
            country_cache.json
          if-no-files-found: warn

      # 清理缓存文件
      - name: Clean up
        if: always()
        run: |
          rm -f country_cache.json

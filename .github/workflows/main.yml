name: Cloudflare IP 处理与测速

on:
  schedule:
    - cron: '0 0 * * 1' # 每周一 UTC 0 点运行
  workflow_dispatch: # 支持手动触发

jobs:
  process-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # 整体工作流超时 30 分钟
    env:
      MAXMIND_LICENSE_KEY: ${{ secrets.MAXMIND_LICENSE_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PYTHONUNBUFFERED: 1
      PYTHONIOENCODING: utf-8
    steps:
      # 检出仓库代码
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史以支持变基

      # 设置 Python 环境
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 缓存 Pip 依赖
      - name: 缓存 Pip 依赖
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 安装依赖
      - name: 安装依赖
        timeout-minutes: 5
        run: |
          echo "::group::安装依赖"
          sudo apt-get update && sudo apt-get install -y expect
          python -m pip install --upgrade pip -i https://mirrors.aliyun.com/pypi/simple/
          unbuffer pip install --timeout 60 --retries 5 --progress-bar off -i https://mirrors.aliyun.com/pypi/simple/ requests charset_normalizer geoip2 || {
            echo "Pip 安装失败，输出调试信息"
            pip list
            pip cache dir
            exit 1
          }
          echo "依赖安装完成"
          echo "::endgroup::"

      # 检查 Python 脚本语法
      - name: 检查脚本语法
        run: |
          echo "::group::检查脚本语法"
          python3 -m py_compile ip-filter-speedtest-api.py
          if [ $? -ne 0 ]; then
            echo "脚本语法错误"
            exit 1
          fi
          echo "::endgroup::"

      # 清理工作目录
      - name: 清理工作目录
        run: |
          echo "::group::清理工作目录"
          git clean -fd
          git reset --hard
          git status
          echo "工作目录已清理"
          echo "::endgroup::"

      # 确保 iptest.sh 或 iptest 可执行
      - name: 配置测速脚本
        run: |
          echo "::group::配置测速脚本"
          found=false
          for script in iptest.sh iptest; do
            if [ -f "$script" ]; then
              chmod +x "$script"
              echo "$script 已设置为可执行"
              found=true
            fi
          done
          if [ "$found" = false ]; then
            echo "错误：未找到 iptest.sh 或 iptest"
            exit 1
          fi
          echo "::endgroup::"

      # 检查 Git 状态
      - name: 检查 Git 状态
        run: |
          echo "::group::检查 Git 状态"
          git status
          echo "未跟踪文件："
          git ls-files --others --exclude-standard
          echo "::endgroup::"

      # 第一步：生成 ip.txt
      - name: 生成 ip.txt
        timeout-minutes: 5
        run: |
          echo "::group::生成 ip.txt"
          python3 ip-filter-speedtest-api.py
          if [ -f ip.txt ] && [ -s ip.txt ]; then
            echo "ip.txt 已生成，节点数：$(wc -l < ip.txt)"
          else
            echo "ip.txt 生成失败或为空"
            exit 1
          fi
          echo "::endgroup::"

      # 第二步：测速并推送
      - name: 测速并推送
        timeout-minutes: 25
        run: |
          echo "::group::测速日志"
          python3 ip-filter-speedtest-api.py --generate-ips
          echo "::endgroup::"
          echo "::group::检查生成文件"
          if [ -f ip.txt ] && [ -s ip.txt ]; then
            echo "ip.txt 存在，节点数：$(wc -l < ip.txt)"
          else
            echo "警告：ip.txt 不存在或为空"
          fi
          if [ -f ip.csv ] && [ -s ip.csv ]; then
            node_count=$(grep -v '^$' ip.csv | wc -l)
            node_count=$(( node_count - 1 )) # 减去表头
            echo "ip.csv 已生成，节点数：${node_count}"
          else
            echo "ip.csv 生成失败或为空"
            exit 1
          fi
          if [ -f ips.txt ] && [ -s ips.txt ]; then
            echo "ips.txt 已生成，节点数：$(wc -l < ips.txt)"
          else
            echo "ips.txt 生成失败或为空"
            exit 1
          fi
          echo "::endgroup::"

      # 检查测速日志
      - name: 检查测速日志
        run: |
          echo "::group::检查测速日志"
          if [ -f speedtest.log ]; then
            echo "speedtest.log 内容（最后 20 行）："
            tail -n 20 speedtest.log
          else
            echo "speedtest.log 不存在"
          fi
          echo "::endgroup::"

      # 确认最新提交
      - name: 确认最新提交
        run: |
          echo "::group::确认最新提交"
          echo "当前分支："
          git rev-parse --abbrev-ref HEAD
          echo "最近提交："
          git log -1 --pretty=%H --date=iso || echo "无提交历史"
          git status
          echo "::endgroup::"

      # 验证推送文件
      - name: 验证推送内容
        run: |
          echo "::group::验证推送内容"
          # 检查文件是否存在且非空
          for file in ip.txt ip.csv ips.txt; do
            if [ ! -f "$file" ] || [ ! -s "$file" ]; then
              echo "错误：$file 不存在或为空"
              exit 1
            fi
          done
          echo "所有目标文件存在且非空"
          # 获取最新提交的文件列表，排除元数据
          git diff-tree --no-commit-id --name-only -r HEAD > commit_files.txt 2>/dev/null || {
            echo "未找到提交历史，创建空提交以继续"
            git commit --allow-empty -m "Initial empty commit for validation"
            git diff-tree --no-commit-id --name-only -r HEAD > commit_files.txt
          }
          echo "最近提交的文件："
          cat commit_files.txt
          # 检查是否包含预期文件
          grep -E 'ip\.txt|ip\.csv|ips\.txt' commit_files.txt > expected_files.txt
          # 检查意外文件
          grep -v -E 'ip\.txt|ip\.csv|ips\.txt' commit_files.txt > unexpected_files.txt
          if [ -s unexpected_files.txt ]; then
            echo "错误：检测到意外文件被提交："
            cat unexpected_files.txt
            exit 1
          else
            echo "验证通过：仅提交 ip.txt, ip.csv, ips.txt（或空提交）"
          fi
          echo "::endgroup::"

      # 清理临时文件
      - name: 清理临时文件
        run: |
          echo "::group::清理临时文件"
          rm -f commit_files.txt expected_files.txt unexpected_files.txt
          echo "临时文件已清理"
          echo "::endgroup::"

      # 调试失败
      - name: 调试 Git 状态
        if: failure()
        run: |
          echo "::group::调试 Git 状态"
          git status
          git diff
          ls -la
          cat speedtest.log || echo "speedtest.log 不存在"
          if [ -f /tmp/temp_proxy.csv ]; then
            echo "数据源样本："
            head -n 5 /tmp/temp_proxy.csv
          fi
          echo "Pip 缓存目录："
          pip cache dir || echo "无法获取 pip 缓存目录"
          pip list || echo "无法列出已安装的包"
          echo "::endgroup::"

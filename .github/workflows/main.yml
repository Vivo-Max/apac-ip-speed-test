name: Cloudflare IP 处理与测速

on:
  schedule:
    - cron: '0 0 * * 1' # 每周一 UTC 0 点运行
  workflow_dispatch: # 支持手动触发

jobs:
  process-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # 整体工作流超时 30 分钟
    env:
      MAXMIND_LICENSE_KEY: ${{ secrets.MAXMIND_LICENSE_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      # 检出仓库代码
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史以支持变基

      # 设置 Python 环境
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 安装依赖
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests charset_normalizer geoip2
          echo "依赖安装完成"

      # 检查 Python 脚本语法
      - name: 检查脚本语法
        run: |
          python3 -m py_compile ip-filter-speedtest-api.py
          if [ $? -ne 0 ]; then
            echo "脚本语法错误"
            exit 1
          fi

      # 清理工作目录
      - name: 清理工作目录
        run: |
          git clean -fd
          git reset --hard
          git status
          echo "工作目录已清理"

      # 确保 iptest.sh 或 iptest 可执行
      - name: 配置测速脚本
        run: |
          found=false
          for script in iptest.sh iptest; do
            if [ -f "$script" ]; then
              chmod +x "$script"
              echo "$script 已设置为可执行"
              found=true
            fi
          done
          if [ "$found" = false ]; then
            echo "错误：未找到 iptest.sh 或 iptest"
            exit 1
          fi

      # 检查 Git 状态
      - name: 检查 Git 状态
        run: |
          git status
          echo "未跟踪文件："
          git ls-files --others --exclude-standard

      # 第一步：生成 ip.txt
      - name: 生成 ip.txt
        timeout-minutes: 5
        run: |
          python3 ip-filter-speedtest-api.py
          if [ -f ip.txt ] && [ -s ip.txt ]; then
            echo "ip.txt 已生成，节点数：$(wc -l < ip.txt)"
          else
            echo "ip.txt 生成失败或为空"
            exit 1
          fi

      # 第二步：测速并生成 ip.csv 和 ips.txt
      - name: 测速并推送
        timeout-minutes: 25
        run: |
          python3 ip-filter-speedtest-api.py --generate-ips
          if [ -f ip.txt ] && [ -s ip.txt ]; then
            echo "ip.txt 存在，节点数：$(wc -l < ip.txt)"
          else
            echo "警告：ip.txt 不存在或为空"
          fi
          if [ -f ip.csv ] && [ -s ip.csv ]; then
            node_count=$(( $(wc -l < ip.csv) - 1 ))
            echo "ip.csv 已生成，节点数：${node_count}"
          else
            echo "ip.csv 生成失败或为空"
            exit 1
          fi
          if [ -f ips.txt ] && [ -s ips.txt ]; then
            echo "ips.txt 已生成，节点数：$(wc -l < ips.txt)"
          else
            echo "ips.txt 生成失败或为空"
            exit 1
          fi

      # 验证推送文件
      - name: 验证推送内容
        run: |
          # 检查文件是否存在且非空
          for file in ip.txt ip.csv ips.txt; do
            if [ ! -f "$file" ] || [ ! -s "$file" ]; then
              echo "错误：$file 不存在或为空"
              exit 1
            fi
          done
          echo "所有目标文件存在且非空"
          # 检查最新提交（允许无变更）
          git status --porcelain > git_status.txt
          if grep -E '^[ MAD].*ip\.(txt|csv)' git_status.txt; then
            echo "检测到 ip.txt 或 ip.csv 修改，将提交"
            git log -1 --name-only > commit_files.txt
            echo "最近提交的文件："
            cat commit_files.txt
            grep -E 'ip\.txt|ip\.csv|ips\.txt' commit_files.txt > expected_files.txt
            grep -v -E 'ip\.txt|ip\.csv|ips\.txt' commit_files.txt > unexpected_files.txt
            if [ -s unexpected_files.txt ]; then
              echo "错误：检测到意外文件被提交："
              cat unexpected_files.txt
              exit 1
            else
              echo "验证通过：仅提交 ip.txt, ip.csv, ips.txt"
            fi
          else
            echo "无 ip.txt, ip.csv, ips.txt 修改，跳过提交验证"
          fi

      # 调试失败
      - name: 调试 Git 状态
        if: failure()
        run: |
          git status
          git diff
          ls -la
          cat speedtest.log || echo "speedtest.log 不存在"
          if [ -f /tmp/temp_proxy.csv ]; then
            echo "数据源样本："
            head -n 5 /tmp/temp_proxy.csv
          fi

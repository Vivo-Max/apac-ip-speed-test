name: Cloudflare IP 处理与测速

on:
  schedule:
    - cron: '0 0 * * 1' # 每周一 UTC 0 点运行
  workflow_dispatch: # 支持手动触发

jobs:
  process-and-test:
    runs-on: ubuntu-latest
    env:
      MAXMIND_LICENSE_KEY: ${{ secrets.MAXMIND_LICENSE_KEY }}
    steps:
      # 检出仓库代码
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史

      # 设置 Python 环境
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 创建 requirements.txt
      - name: 创建依赖文件
        run: |
          cat << EOF > requirements.txt
          requests
          charset-normalizer
          geoip2
          EOF

      # 安装依赖
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip cache purge || true
          pip install -r requirements.txt
          echo "依赖安装完成"
          pip list

      # 验证依赖
      - name: 验证依赖
        run: |
          python -c "import sys; missing = [pkg for pkg in ['requests', 'charset_normalizer', 'geoip2'] if not __import__(pkg, fromlist=[''])]; sys.exit(1 if missing else 0)" || { echo "缺少依赖: $(python -c "import sys; print([pkg for pkg in ['requests', 'charset_normalizer', 'geoip2'] if not __import__(pkg, fromlist=[''])])")"; exit 1; }
          echo "所有依赖验证通过"

      # 检查 Python 脚本语法
      - name: 检查脚本语法
        run: |
          python3 -m py_compile ip-filter-speedtest-api.py
          if [ $? -ne 0 ]; then
            echo "脚本语法错误"
            exit 1
          fi

      # 修复测速脚本格式
      - name: 修复测速脚本格式
        run: |
          if [ -f iptest.sh ]; then
            sudo apt-get update && sudo apt-get install -y dos2unix
            dos2unix iptest.sh || true
            if ! head -n 1 iptest.sh | grep -q '^#!/'; then
              echo '#!/bin/bash' | cat - iptest.sh > temp.sh && mv temp.sh iptest.sh
              chmod +x iptest.sh
              echo "已为 iptest.sh 添加 shebang"
            fi
            file iptest.sh
            chmod +x iptest.sh
          else
            echo "错误：iptest.sh 不存在"
            exit 1
          fi

      # 确保 iptest.sh 和 iptest 可执行
      - name: 配置测速脚本
        continue-on-error: true
        run: |
          found=false
          for script in iptest.sh iptest; do
            if [ -f "$script" ]; then
              chmod +x "$script"
              echo "$script 已设置为可执行"
              found=true
            fi
          done
          if [ "$found" = false ]; then
            echo "警告：未找到 iptest.sh 或 iptest"
          fi

      # 生成 ip.txt
      - name: 生成 ip.txt
        timeout-minutes: 5
        run: |
          python3 ip-filter-speedtest-api.py
          if [ -f ip.txt ] && [ -s ip.txt ]; then
            echo "ip.txt 已生成，节点数：$(wc -l < ip.txt)"
          else
            echo "ip.txt 生成失败或为空"
            exit 1
          fi

      # 生成 ip.csv 和 ips.txt
      - name: 生成 ip.csv 和 ips.txt
        timeout-minutes: 30
        run: |
          python3 ip-filter-speedtest-api.py --generate-ips
          if [ -f ip.csv ] && [ -s ip.csv ]; then
            echo "ip.csv 已生成，节点数：$(($(wc -l < ip.csv) - 1))"
            head -n 1 ip.csv | grep -q "IP,Port,DataCenter,Region,City,Delay_ms,Download_MBps" || { echo "ip.csv 表头错误"; exit 1; }
          else
            echo "ip.csv 生成失败或为空"
            exit 1
          fi
          if [ -f ips.txt ] && [ -s ips.txt ]; then
            echo "ips.txt 已生成，节点数：$(wc -l < ips.txt)"
          else
            echo "ips.txt 生成失败或为空"
            exit 1
          fi

      # 验证 ip.txt 格式
      - name: 验证 ip.txt 格式
        run: |
          if [ -f ip.txt ]; then
            while IFS=' ' read -r ip port; do
              if [[ ! "$ip" =~ ^[0-9.:]+$ ]] || [[ ! "$port" =~ ^[0-9]+$ ]]; then
                echo "错误：ip.txt 格式不正确，期望 'IP 端口'，实际: $ip $port"
                exit 1
              fi
            done < ip.txt
            echo "ip.txt 格式正确"
          else
            echo "错误：ip.txt 不存在"
            exit 1
          fi

      # 验证文件
      - name: 验证文件
        run: |
          if [ ! -s ip.txt ]; then
            echo "错误：ip.txt 为空"
            exit 1
          fi
          if [ ! -s ip.csv ]; then
            echo "错误：ip.csv 为空"
            exit 1
          fi
          if [ ! -s ips.txt ]; then
            echo "错误：ips.txt 为空"
            exit 1
          fi
          echo "所有文件验证通过"

      # 推送文件
      - name: 推送 ip.txt, ip.csv, ips.txt
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "bot@example.com"
          git pull --rebase || true
          git add ip.txt ip.csv ips.txt
          git commit -m "Update ip.txt, ip.csv, ips.txt by Actions [skip ci]" || true
          git push || true

name: Proxy IP Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 00:00 运行
  workflow_dispatch:  # 支持手动触发

jobs:
  check-proxy-ip:
    runs-on: ubuntu-latest

    steps:
      # 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 检查 input.csv 是否存在并打印内容
      - name: Check for input.csv
        run: |
          if [ ! -f "input.csv" ]; then
            echo "Warning: input.csv not found, will try URL"
          else
            echo "input.csv found, first 5 lines:"
            head -n 5 input.csv
          fi

      # 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests charset-normalizer

      # 安装系统依赖（确保 iptest.sh 的依赖）
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

      # 确保测速脚本存在并可执行
      - name: Prepare speedtest script
        run: |
          if [ -f "iptest.sh" ]; then
            chmod +x iptest.sh
            echo "iptest.sh found and made executable"
          else
            echo "iptest.sh not found!"
            exit 1
          fi

      # 运行脚本，带重试机制
      - name: Run proxy IP check
        env:
          PYTHONUNBUFFERED: 1  # 实时输出日志
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 60  # 增加超时时间
          max_attempts: 3
          command: python -u ip-filter-speedtest-api.py

      # 调试 ip.txt
      - name: Debug ip.txt
        if: always()
        run: |
          if [ -f "ip.txt" ]; then
            echo "ip.txt exists, content:"
            cat ip.txt
          else
            echo "ip.txt not found!"
          fi

      # 上传结果文件
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proxy-ip-results
          path: |
            ip.txt
            ip.csv
            ips.txt
            country_cache.json
          if-no-files-found: warn

      # 清理缓存文件
      - name: Clean up
        if: always()
        run: |
          rm -f country_cache.json

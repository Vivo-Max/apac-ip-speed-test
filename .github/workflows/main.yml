name: Cloudflare IP 处理与测速

on:
  schedule:
    - cron: '0 0 * * 1' # 每周一 UTC 0 点运行
  workflow_dispatch: # 支持手动触发

jobs:
  process-and-test:
    runs-on: ubuntu-latest
    env:
      MAXMIND_LICENSE_KEY: ${{ secrets.MAXMIND_LICENSE_KEY }}
      # 不设置 GITHUB_TOKEN，脚本不推送
    steps:
      # 检出仓库代码
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史

      # 设置 Python 环境
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # 安装依赖
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests charset-normalizer geoip2 beautifulsoup4 lxml pandas
          echo "依赖安装完成"

      # 检查 Python 脚本语法
      - name: 检查脚本语法
        run: |
          python3 -m py_compile ip-filter-speedtest-api.py
          if [ $? -ne 0 ]; then
            echo "脚本语法错误"
            exit 1
          fi

      # 确保 iptest.sh 和 iptest 可执行
      - name: 配置测速脚本
        continue-on-error: true
        run: |
          found=false
          for script in iptest.sh iptest; do
            if [ -f "$script" ]; then
              chmod +x "$script"
              echo "$script 已设置为可执行"
              found=true
            fi
          done
          if [ "$found" = false ]; then
            echo "警告：未找到 iptest.sh 或 iptest"
          fi

      # 生成所有文件
      - name: 生成 ip.txt, ip.csv, ips.txt
        timeout-minutes: 360 # 最大 6 小时
        run: |
          python3 ip-filter-speedtest-api.py
          if [ -f ip.txt ] && [ -s ip.txt ]; then
            echo "ip.txt 已生成，节点数：$(wc -l < ip.txt)"
          else
            echo "ip.txt 生成失败或为空"
            exit 1
          fi
          if [ -f ip.csv ] && [ -s ip.csv ]; then
            echo "ip.csv 已生成，节点数：$(($(wc -l < ip.csv) - 1))"
          else
            echo "ip.csv 生成失败或为空"
            exit 1
          fi
          if [ -f ips.txt ] && [ -s ips.txt ]; then
            echo "ips.txt 已生成，节点数：$(wc -l < ips.txt)"
          else
            echo "ips.txt 生成失败或为空"
            exit 1
          fi

      # 验证文件
      - name: 验证文件
        run: |
          if [ ! -s ip.txt ]; then
            echo "错误：ip.txt 为空"
            exit 1
          fi
          if [ ! -s ip.csv ]; then
            echo "错误：ip.csv 为空"
            exit 1
          fi
          if [ ! -s ips.txt ]; then
            echo "错误：ips.txt 为空"
            exit 1
          fi
          echo "所有文件验证通过"

      # 推送文件
      - name: 推送 ip.txt, ip.csv, ips.txt
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "bot@example.com"
          git pull --rebase || true
          git add ip.txt ip.csv ips.txt
          git commit -m "Update ip.txt, ip.csv, ips.txt by Actions [skip ci]" || true
          git push || true

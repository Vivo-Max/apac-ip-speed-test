name: Proxy IP Check

on:
  schedule:
    - cron: '0 0 * * 0' # 每周日 UTC 时间 00:00 运行
  workflow_dispatch: # 支持手动触发

jobs:
  check-proxy-ip:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # 作业超时 15 分钟

    steps:
      # 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 安装 Python 依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests charset-normalizer

      # 确保 iptest.sh 和 iptest 可执行
      - name: Make scripts executable
        run: |
          chmod +x iptest.sh
          chmod +x iptest || echo "iptest not found"

      # 运行脚本（超时 10 分钟，重试 1 次）
      - name: Run proxy IP check
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          command: python ip-filter-speedtest-api.py --url-first

      # 保存输出文件
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proxy-ip-results
          path: |
            ip.txt
            ips.txt
            ip.csv
          if-no-files-found: warn

      # 提交结果到仓库
      - name: Commit and push results
        if: always()
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          for file in ip.txt ips.txt ip.csv; do
            [ -f "$file" ] && git add "$file"
          done
          git commit -m "Update proxy IP results $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

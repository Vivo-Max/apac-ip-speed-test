name: IP Filter and Speed Test
on: [push, workflow_dispatch]
jobs:
  check-ip:
    runs-on: ubuntu-latest
    env:
      INPUT_URL: "https://raw.githubusercontent.com/gxiaobai2024/api/refs/heads/main/proxyip%20.csv"
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install requests charset-normalizer tqdm  # 新增 tqdm
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.x'
      - name: Build iptest
        run: |
          go build -o iptest main.go
          chmod +x iptest
      - name: Check syntax
        run: python3 -m py_compile ip-filter-speedtest-api.py
      - name: Run script
        run: python3 ip-filter-speedtest-api.py
      - name: Upload results
        uses: actions/upload-artifact@v3
        with:
          name: ip-results
          path: |
            ip.txt
            ip.csv
            ips.txt
            speedtest.log

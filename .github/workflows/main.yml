name: IP Speed Test

on:
  schedule:
    - cron: '0 0 * * 1'  # 每周一 00:00 UTC
  workflow_dispatch:

jobs:
  speed-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: pip install requests charset-normalizer

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl libcurl4-openssl-dev

      - name: Make iptest and iptest.sh executable
        run: |
          chmod +x iptest || echo "iptest not found"
          chmod +x iptest.sh || echo "iptest.sh not found"

      - name: Debug working directory
        run: |
          pwd
          ls -la

      - name: Test speed test URL
        run: |
          curl -I "https://speed.cloudflare.com/__down?bytes=1000000"

      - name: Run speed test
        run: |
          echo "Start time: $(date)"
          python3 ip-filter-speedtest-api.py
          echo "End time: $(date)"

      - name: Debug generated files
        run: |
          echo "Current directory: $(pwd)"
          ls -la
          if [ -f ip.csv ]; then
            echo "ip.csv exists, content:"
            cat ip.csv
          else
            echo "ip.csv does not exist"
          fi
          if [ -f ips.txt ]; then
            echo "ips.txt exists, content:"
            cat ips.txt
          else
            echo "ips.txt does not exist"
          fi

      - name: Commit and push
        run: |
          echo "Start time: $(date)"
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          if [ -f ip.csv ]; then
            git add ip.csv
          fi
          if [ -f ips.txt ]; then
            git add ips.txt
          fi
          if git diff --staged --quiet; then
            echo "No changes in ip.csv or ips.txt, skipping commit"
          else
            git commit -m "Update speed test results and ips.txt"
            git push
          fi
          echo "End time: $(date)"

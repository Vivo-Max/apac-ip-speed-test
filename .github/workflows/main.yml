name: IP Speed Test
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  speedtest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
    - name: Cache GeoIP
      uses: actions/cache@v4
      with:
        path: GeoLite2-Country.mmdb
        key: geoip-2025.04.10
    - run: pip install geoip2 requests charset-normalizer
    - run: chmod +x iptest.sh iptest
    - name: Check input size
      run: curl -s $INPUT_URL | wc -l
      env:
        INPUT_URL: https://raw.githubusercontent.com/gxiaobai2024/api/refs/heads/main/proxyip%20.csv
    - name: Test network
      run: curl -o /dev/null -s -w "%{time_total}s\n" speed.cloudflare.com/__down?bytes=1000000
    - run: python ip-filter-speedtest-api.py
    - uses: actions/upload-artifact@v4
      with:
        name: speedtest-results
        path: |
          ip.txt
          ip.csv
          ips.txt
          speedtest.log

name: IP Speed Test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  speedtest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache GeoIP database
        uses: actions/cache@v4
        with:
          path: GeoLite2-Country.mmdb
          key: geoip-2025.04.10
          restore-keys: |
            geoip-

      - name: Install dependencies
        run: pip install geoip2 requests charset-normalizer

      - name: Set execute permissions
        run: chmod +x iptest.sh iptest
        continue-on-error: true

      - name: Validate input data
        run: |
          echo "Downloading and validating input CSV..." > input_size.txt
          curl -s -o input.csv $INPUT_URL
          lines=$(wc -l < input.csv)
          echo "Input CSV lines: $lines" >> input_size.txt
          head -n 5 input.csv > input_sample.txt
          echo "Input sample (first 5 lines):" >> input_size.txt
          cat input_sample.txt >> input_size.txt
          echo "Checking desired countries..." >> input_size.txt
          grep -E 'TW|JP|HK|SG|KR|IN|KP|VN|TH|MM' input.csv | wc -l > desired_count.txt
          echo "Desired countries nodes: $(cat desired_count.txt)" >> input_size.txt
          if [ "$lines" -lt 1000 ]; then
            echo "Warning: Input contains fewer than 1000 lines" >> input_size.txt
          fi
        env:
          INPUT_URL: https://raw.githubusercontent.com/gxiaobai2024/api/refs/heads/main/proxyip%20.csv

      - name: Run IP extraction
        run: python ip-filter-speedtest-api.py --url=$INPUT_URL --extract-only
        env:
          INPUT_URL: https://raw.githubusercontent.com/gxiaobai2024/api/refs/heads/main/proxyip%20.csv
        timeout-minutes: 2

      - name: Commit and push desired nodes file
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add desired_nodes.csv
          git commit -m "Add desired_nodes.csv with desired countries" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Summarize results
        run: |
          echo "desired_nodes.csv nodes: $(tail -n +2 desired_nodes.csv | wc -l 2>/dev/null || echo 0)" > summary.txt
          echo "Log summary:" >> summary.txt
          grep -E "解析到|生成 desired_nodes.csv|国家分布|错误|警告" speedtest.log >> summary.txt || echo "No relevant log entries" >> summary.txt
          cat summary.txt
        continue-on-error: true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: speedtest-results
          path: |
            desired_nodes.csv
            speedtest.log
            input_size.txt
            input_sample.txt
            desired_count.txt
            summary.txt
          if-no-files-found: warn

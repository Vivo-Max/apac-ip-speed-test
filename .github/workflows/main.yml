name: IP Speed Test

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1"

jobs:
  speedtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests charset-normalizer geoip2 --user
          pip list | grep -E "requests|charset-normalizer|geoip2"
        shell: bash

      - name: Set execute permissions
        run: chmod +x iptest.sh iptest
        shell: bash
        continue-on-error: true

      - name: Run script
        run: python ip-filter-speedtest-api.py --url=$INPUT_URL --generate-ips
        env:
          INPUT_URL: https://raw.githubusercontent.com/gxiaobai2024/api/refs/heads/main/proxyip%20.csv
        shell: bash
        timeout-minutes: 20
        continue-on-error: true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: speedtest-results
          path: |
            ip.txt
            ip.csv
            ips.txt
            speedtest.log
          if-no-files-found: warn

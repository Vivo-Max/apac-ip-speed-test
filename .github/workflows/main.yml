name: IP Speed Test

on:
  schedule:
    - cron: '0 0 * * 1'  # 每周一 00:00 UTC
  workflow_dispatch:

jobs:
  speed-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Build Cloudflare IP SpeedTest
        run: |
          git clone https://github.com/bh-qt/Cloudflare-IP-SpeedTest.git
          cd Cloudflare-IP-SpeedTest
          go build -o ipspeedtest main.go
          mv ipspeedtest ../

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: pip install requests charset-normalizer

      - name: Install system dependencies
        run: |
          # 更换为阿里云镜像源（可选，视网络情况选择）
          sudo sed -i 's|http://archive.ubuntu.com|http://mirrors.aliyun.com|g' /etc/apt/sources.list
          sudo sed -i 's|http://security.ubuntu.com|http://mirrors.aliyun.com|g' /etc/apt/sources.list

          # 重试机制，最多尝试 3 次，每次超时 5 分钟
          for i in {1..3}; do
            echo "尝试第 $i 次执行 apt-get update..."
            timeout 300 sudo apt-get update && break
            if [ $i -eq 3 ]; then
              echo "apt-get update 失败，退出"
              exit 1
            fi
            echo "apt-get update 失败，等待 10 秒后重试..."
            sleep 10
          done

          # 安装 curl 和 libcurl4-openssl-dev
          sudo apt-get install -y curl libcurl4-openssl-dev

      - name: Create iptest.sh
        run: |
          echo '#!/bin/bash' > iptest.sh
          echo './ipspeedtest -file=ip.txt -tls=true -speedtest=10 -speedlimit=5 -url="speed.cloudflare.com/__down?bytes=50000000" -max=200 -outfile="ip.csv"' >> iptest.sh
          chmod +x iptest.sh

      - name: Debug working directory
        run: |
          pwd
          ls -la

      - name: Test speed test URL
        run: |
          curl -I "https://speed.cloudflare.com/__down?bytes=50000000"

      - name: Run speed test
        run: |
          echo "Start time: $(date)"
          python3 ip-filter-speedtest-api.py
          echo "End time: $(date)"

      - name: Debug generated files
        run: |
          echo "Current directory: $(pwd)"
          ls -la
          if [ -f ip.csv ]; then
            echo "ip.csv exists, content:"
            cat ip.csv
          else
            echo "ip.csv does not exist"
          fi
          if [ -f ips.txt ]; then
            echo "ips.txt exists, content:"
            cat ips.txt
          else
            echo "ips.txt does not exist"
          fi

      - name: Commit and push
        run: |
          echo "Start time: $(date)"
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          if [ -f ip.csv ]; then
            git add ip.csv
          fi
          if [ -f ips.txt ]; then
            git add ips.txt
          fi
          if git diff --staged --quiet; then
            echo "No changes in ip.csv or ips.txt, skipping commit"
          else
            git commit -m "Update speed test results and ips.txt"
            git push
          fi
          echo "End time: $(date)"

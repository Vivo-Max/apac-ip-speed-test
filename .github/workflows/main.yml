name: IP Filter and Speed Test

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'  # 每天运行一次
  workflow_dispatch:  # 允许手动触发

jobs:
  filter-and-test:
    runs-on: ubuntu-latest

    steps:
      # 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests charset-normalizer urllib3

      # 调试：检查 input.csv 是否存在
      - name: Check input.csv
        run: |
          if [ -f "input.csv" ]; then
            echo "input.csv exists"
            cat input.csv
          else
            echo "input.csv does not exist"
            exit 1
          fi

      # 确保 speedtest-tool 和 iptest.sh 可执行
      - name: Make files executable
        run: |
          chmod +x tools/speedtest-tool
          chmod +x iptest.sh

      # 运行脚本
      - name: Run IP filter and speed test
        run: python ip-filter-speedtest-api.py

      # 调试：检查生成的文件
      - name: Check generated files
        run: |
          echo "Checking ip.txt..."
          if [ -f "ip.txt" ]; then
            cat ip.txt
          else
            echo "ip.txt not found"
          fi
          echo "Checking ip.csv..."
          if [ -f "ip.csv" ]; then
            cat ip.csv
          else
            echo "ip.csv not found"
          fi
          echo "Checking ips.txt..."
          if [ -f "ips.txt" ]; then
            cat ips.txt
          else
            echo "ips.txt not found"
          fi

      # 上传结果（可选）
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: speed-test-results
          path: |
            ip.txt
            ip.csv
            ips.txt

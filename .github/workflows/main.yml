name: Speed Test
on:
  workflow_dispatch:  # 手动触发
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0:00 运行（可调整）
jobs:
  speed-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # 使用 3.11，避免 3.13 潜在兼容问题
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests charset-normalizer geoip2
      - name: Run script to generate ip.txt
        run: python ip-filter-speedtest-api.py
      - name: Run script to generate ip.csv and ips.txt
        run: python ip-filter-speedtest-api.py --generate-ips
      - name: Commit and push results
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          files=""
          for file in ip.txt ip.csv ips.txt; do
            if [ -f "$file" ] && [ -s "$file" ]; then
              files="$files $file"
            fi
          done
          if [ -n "$files" ]; then
            git add $files
            git commit -m "Update ip.txt, ip.csv, ips.txt [skip ci]" || echo "No changes to commit"
            git push || echo "Push failed, please check"
            echo "Pushed files: $files"
          else
            echo "No valid files to commit"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

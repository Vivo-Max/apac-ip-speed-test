name: IP Filter and Speed Test

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 00:00 运行
  workflow_dispatch:  # 支持手动触发

jobs:
  filter-and-speed-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 整个工作流最大运行时间 60 分钟

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史以支持 Git 操作
          token: ${{ secrets.GITHUB_TOKEN }}  # 确保有权限推送

      # 2. 设置 Python 环境
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'  # 缓存 pip 依赖以加速安装

      # 3. 缓存 pip 依赖
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt --verbose
          else
            echo "未找到 requirements.txt，跳过"
          fi
          pip install geoip2 --verbose
          python -c "import geoip2; print('geoip2 模块已成功安装')"
        env:
          PIP_LOG: pip.log

      # 5. 准备 iptest.sh 和 iptest
      - name: Prepare iptest.sh and iptest
        run: |
          if [ -f "./iptest.sh" ] && [ -f "./iptest" ]; then
            echo "找到本地 iptest.sh 和 iptest，直接使用"
          else
            echo "错误：未找到 iptest.sh 或 iptest，请确保仓库中包含这两个文件"
            exit 1
          fi
          chmod +x ./iptest.sh
          chmod +x ./iptest
          echo "iptest.sh 和 iptest 已授权并准备好"
        shell: bash

      # 6. 运行脚本（第一阶段：生成 ip.txt）
      - name: Run script to generate ip.txt
        run: |
          python ip-filter-speedtest-api.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAXMIND_LICENSE_KEY: ${{ secrets.MAXMIND_LICENSE_KEY }}
        timeout-minutes: 15

      # 7. 运行脚本（第二阶段：测速并生成 ip.csv 和 ips.txt）
      - name: Run script to perform speed test and generate ip.csv, ips.txt
        run: |
          python ip-filter-speedtest-api.py --generate-ips
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAXMIND_LICENSE_KEY: ${{ secrets.MAXMIND_LICENSE_KEY }}
        timeout-minutes: 30

      # 8. 配置 Git 用户
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
        if: success()

      # 9. 提交生成的文件
      - name: Commit generated files
        run: |
          git add ip.txt ip.csv ips.txt speedtest.log pip.log country_cache.json || echo "没有文件需要添加"
          git commit -m "Update IP filter and speed test results" || echo "没有更改需要提交"
        if: success()

      # 10. 推送到 main 分支
      - name: Push changes
        run: |
          git fetch origin
          git rebase origin/main
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: success()

      # 11. 上传生成的工件
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ip-files
          path: |
            ip.txt
            ip.csv
            ips.txt
            speedtest.log
            pip.log
            country_cache.json
        if: always()
